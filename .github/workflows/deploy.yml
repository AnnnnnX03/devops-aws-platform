# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────
# CI/CD PIPELINE — GitHub Actions
# Trigger: every push to main branch
#
# Pipeline stages:
# 1. Test     → run unit tests
# 2. Build    → build Docker image
# 3. Push     → push image to ECR
# 4. Deploy   → update ECS service (rolling update)
# ─────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Environment variables available to all jobs
env:
  AWS_REGION: ap-southeast-2
  ECR_BACKEND_REPO: devops-platform-backend
  ECS_CLUSTER: devops-platform-cluster
  ECS_SERVICE: devops-platform-backend-service

jobs:

  # ── JOB 1: TEST ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest           # GitHub spins up a fresh Ubuntu VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4    # Pull your code into the VM

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/backend/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          cd app/backend
          pytest tests/ -v --tb=short

  # ── JOB 2: BUILD & PUSH ────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test                      # Only runs if test job passes
    if: github.ref == 'refs/heads/main'   # Only on main branch, not PRs

    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
        # Secrets are stored in GitHub → Settings → Secrets
        # They are NEVER visible in logs

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}   # Use git commit SHA as image tag
        run: |
          # Build the Docker image
          docker build \
            -f docker/Dockerfile.backend \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest \
            .

          # Push both the commit-SHA tag and 'latest'
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest

          # Pass image tag to next job
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── JOB 3: DEPLOY ──────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push            # Only runs if build job passes
    environment: production          # Requires manual approval (optional)

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        run: |
          # Force ECS to pull the new image and do a rolling update
          # This is how "zero downtime deployment" works:
          # ECS starts new containers → health check passes → old containers removed
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Deployment successful!"

      - name: Notify deployment
        run: |
          echo "🚀 Deployed commit ${{ github.sha }} to ECS"
          echo "🔗 Image tag: ${{ needs.build-and-push.outputs.image-tag }}"
