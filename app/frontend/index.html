<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 1rem 2rem; border-bottom: 1px solid #334155; }
    header h1 { color: #38bdf8; font-size: 1.4rem; }
    header span { color: #64748b; font-size: 0.85rem; margin-left: 1rem; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { color: #38bdf8; margin-bottom: 1rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .status { display: flex; align-items: center; gap: 0.5rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    input, textarea { width: 100%; padding: 0.6rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; margin-bottom: 0.75rem; font-size: 0.9rem; }
    button { background: #0ea5e9; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #38bdf8; }
    .response { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 1rem; margin-top: 0.75rem; font-size: 0.85rem; min-height: 60px; white-space: pre-wrap; }
    .items-list { list-style: none; }
    .items-list li { padding: 0.5rem; border-bottom: 1px solid #334155; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .metric { text-align: center; padding: 1rem; background: #0f172a; border-radius: 6px; }
    .metric .value { font-size: 2rem; color: #38bdf8; font-weight: bold; }
    .metric .label { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <header>
    <h1>🚀 DevOps Platform</h1>
    <span id="env-badge">Loading...</span>
  </header>

  <main>

    <!-- Health Status -->
    <div class="card">
      <h2>System Status</h2>
      <div class="status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Checking...</span>
      </div>
    </div>

    <!-- Metrics -->
    <div class="card">
      <h2>Live Metrics (4 Golden Signals)</h2>
      <div class="grid">
        <div class="metric"><div class="value" id="m-requests">-</div><div class="label">Total Requests</div></div>
        <div class="metric"><div class="value" id="m-errors">-</div><div class="label">Errors</div></div>
      </div>
    </div>

    <!-- Items CRUD -->
    <div class="card">
      <h2>Items API</h2>
      <input id="item-name" placeholder="Item name" />
      <input id="item-desc" placeholder="Description" />
      <button onclick="createItem()">Create Item</button>
      <button onclick="loadItems()" style="background:#334155; margin-left:0.5rem">Refresh List</button>
      <ul class="items-list" id="items-list" style="margin-top:1rem"></ul>
    </div>

    <!-- AI Chat -->
    <div class="card">
      <h2>AI Service</h2>
      <textarea id="ai-input" rows="3" placeholder="Ask the AI something..."></textarea>
      <button onclick="callAI()">Send to AI →</button>
      <div class="response" id="ai-response">AI response will appear here...</div>
    </div>

  </main>

  <script>
    // ── CONFIG ────────────────────────────────────────────────
    // In production, BACKEND_URL = your ALB DNS name
    // Locally, it's localhost:8000
    const BACKEND_URL = window.BACKEND_URL || 'http://localhost:8000';
    const AI_URL = window.AI_URL || 'http://localhost:8001';

    // ── HEALTH CHECK ──────────────────────────────────────────
    async function checkHealth() {
      try {
        const res = await fetch(`${BACKEND_URL}/health`);
        const data = await res.json();
        document.getElementById('status-dot').style.background = '#22c55e';
        document.getElementById('status-text').textContent = `Healthy — ${data.environment}`;
        document.getElementById('env-badge').textContent = `env: ${data.environment}`;
      } catch {
        document.getElementById('status-dot').style.background = '#ef4444';
        document.getElementById('status-text').textContent = 'Backend unreachable';
      }
    }

    // ── METRICS ───────────────────────────────────────────────
    async function loadMetrics() {
      try {
        const res = await fetch(`${BACKEND_URL}/metrics`);
        const data = await res.json();
        document.getElementById('m-requests').textContent = data.request_count;
        document.getElementById('m-errors').textContent = data.error_count;
      } catch {}
    }

    // ── ITEMS ─────────────────────────────────────────────────
    async function loadItems() {
      const res = await fetch(`${BACKEND_URL}/items`);
      const data = await res.json();
      const ul = document.getElementById('items-list');
      ul.innerHTML = data.items.length === 0
        ? '<li style="color:#64748b">No items yet</li>'
        : data.items.map(i => `<li>📦 <strong>${i.name}</strong> — ${i.description}</li>`).join('');
    }

    async function createItem() {
      const name = document.getElementById('item-name').value;
      const description = document.getElementById('item-desc').value;
      if (!name) return;
      await fetch(`${BACKEND_URL}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description })
      });
      document.getElementById('item-name').value = '';
      document.getElementById('item-desc').value = '';
      loadItems();
    }

    // ── AI ────────────────────────────────────────────────────
    async function callAI() {
      const message = document.getElementById('ai-input').value;
      if (!message) return;
      document.getElementById('ai-response').textContent = 'Thinking...';
      try {
        const res = await fetch(`${AI_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        document.getElementById('ai-response').textContent = data.response;
      } catch (e) {
        document.getElementById('ai-response').textContent = 'Error: ' + e.message;
      }
    }

    // ── INIT ──────────────────────────────────────────────────
    checkHealth();
    loadItems();
    loadMetrics();
    setInterval(checkHealth, 30000);    // Check health every 30s
    setInterval(loadMetrics, 10000);    // Refresh metrics every 10s
  </script>
</body>
</html>
